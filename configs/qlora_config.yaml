lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules:
    - q_proj
    - v_proj
  bias: none
  task_type: CAUSAL_LM

training:
  model_name: codellama/CodeLlama-7b-hf
  dataset_name: code_search_net
  dataset_language: python
  output_dir: ./outputs
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  max_seq_length: 512
  save_steps: 100
  logging_steps: 25
  bf16: true
  fp16: false
  optim: adamw_torch

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: bfloat16

generation:
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 256
  num_samples: 10
  do_sample: true
